name: Update live fishing data
on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
permissions:
  contents: write
concurrency:
  group: live-data
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch live data
        env:
          NVE_API_KEY: ${{ secrets.NVE_API_KEY }}
        run: node scripts/update-data.mjs
      - name: Publish safe data file
        run: |
          if git diff --quiet -- data/live.json; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          git commit -m "Update live fishing data"
          git push
